<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Tab Lock Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-card { padding: 20px; }
    .settings-card h2 { font-size: 13px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .setting-row label { font-size: 12px; color: var(--text); }
    .setting-row input[type="range"] { width: 120px; accent-color: var(--accent); }
    .setting-value { font-size: 12px; color: var(--text-secondary); min-width: 36px; text-align: right; }
    .save-btn { margin-top: 16px; width: 100%; padding: 8px; border: none; border-radius: 6px; background: var(--accent); color: var(--bg); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .save-btn:hover { background: var(--accent-hover); }
    .save-btn:disabled { opacity: 0.5; }
    .saved-msg { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <svg class="header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <h1>Settings</h1>
    </div>
    <div class="content" style="min-height:auto">
      <div class="settings-card">
        <h2>Auto-lock timeout</h2>
        <div class="setting-row">
          <label>Lock after inactivity</label>
          <input type="range" id="lockMinutes" min="1" max="60" value="5">
          <span class="setting-value" id="lockValue">5 min</span>
        </div>
        <button class="save-btn" id="saveBtn">Save</button>
        <div class="saved-msg" id="savedMsg"></div>
      </div>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
