<!-- ── Tab Lock popup ──
  Views: main (locked-tab list), settings (auto-lock, media, password),
  password-setup (first-run master password creation).
  All logic in popup.js; styles in styles.css.
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <title>Tab Lock</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <button class="btn-back" id="backBtn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 id="headerTitle">Tab Lock</h1>
    </div>

    <div class="content" id="content">
      <div class="locked-tabs-list" id="lockedTabsList"></div>
      <div class="empty-state" id="emptyState">
        <p>No locked tabs</p>
      </div>
    </div>

    <div class="footer" id="mainFooter">
      <button class="btn-lock" id="lockCurrentTab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Lock Current Tab
      </button>
      <button class="btn-icon" id="settingsBtn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="settings-view" id="settingsView" style="display:none">
      <div class="settings-card">
        <h2>Auto-lock timeout</h2>
        <div class="setting-row">
          <label>Lock after inactivity</label>
          <input type="range" id="lockMinutes" min="1" max="60" value="5">
          <span class="setting-value" id="lockValue">5 min</span>
        </div>
        <button class="save-btn" id="saveBtn">Save</button>
        <div class="saved-msg" id="savedMsg"></div>
      </div>
      <div class="settings-card" style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px">
        <h2>Inactivity behavior</h2>
        <div class="setting-row">
          <label>Media override inactivity lock</label>
          <label class="toggle"><input type="checkbox" id="mediaOverride"><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-row">
          <label>Notify when tab auto-locks in background</label>
          <label class="toggle"><input type="checkbox" id="notifyOnLock"><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px;display:flex;flex-direction:column;gap:8px">
        <button class="save-btn" id="resetPwdBtn">Reset Master Password</button>
        <button class="save-btn" id="uninstallBtn" style="background:var(--danger);color:#fff">Uninstall Extension</button>
      </div>
      <div id="policyStatus" style="font-size:10px;text-align:center;padding:8px 14px 0;line-height:1.4"></div>
      <div style="font-size:9px;text-align:center;padding:6px 14px 10px;color:var(--text-secondary);opacity:0.4">Built by <a href="https://buttonsdigital.co.uk" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">Buttons Digital</a></div>
    </div>

    <div class="password-setup" id="passwordSetup" style="display:none">
      <div class="pwd-card">
        <div class="pwd-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 class="pwd-title">Set Master Password</h2>
        <p class="pwd-desc">This password is required to remove locks and uninstall the extension.</p>
        <input type="password" class="pwd-input" id="pwdInput" placeholder="Enter password" autocomplete="off">
        <input type="password" class="pwd-input" id="pwdConfirm" placeholder="Confirm password" autocomplete="off">
        <div class="pwd-error" id="pwdError"></div>
        <button class="save-btn" id="pwdSaveBtn">Save Password</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
