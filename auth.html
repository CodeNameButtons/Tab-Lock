      background: #2b2a33; color: #f0f0f4;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-size: 14px;

    .card { text-align: center; padding: 32px; }
    .msg { margin: 16px 0; color: #9b9aa5; }

</head>
<body>
  <div class="card">
    <div class="msg" id="msg">Authenticating...</div>

</html>
